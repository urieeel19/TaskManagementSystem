<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5" autocomplete="off">
  
    <div *ngIf="successMessage" 
         class="flex items-center gap-2 rounded-xl bg-emerald-50 p-4 border border-emerald-100 text-sm text-emerald-600 animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span>{{ successMessage }}</span>
    </div>
  
    <div *ngIf="errorMessage" 
         class="flex items-center gap-2 rounded-xl bg-red-50 p-4 border border-red-100 text-sm text-red-600 animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
  
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
      <div class="relative">
        <input 
          type="text" 
          formControlName="username" 
          placeholder="e.g., alexsmith"
          class="w-full rounded-xl border px-4 py-2.5 text-slate-900 shadow-sm outline-none transition-all duration-200"
          [ngClass]="isFieldInvalid('username') 
            ? 'border-red-300 bg-red-50/30 focus:border-red-500 focus:ring-2 focus:ring-red-100' 
            : 'border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100'"
        />
      </div>
      <p *ngIf="isFieldInvalid('username')" class="mt-1.5 text-xs font-medium text-red-500 flex items-center gap-1">
        Username is required (3-50 characters).
      </p>
    </div>
  
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
      <div class="relative">
        <input 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="w-full rounded-xl border px-4 py-2.5 text-slate-900 shadow-sm outline-none transition-all duration-200"
          [ngClass]="isFieldInvalid('password') 
            ? 'border-red-300 bg-red-50/30 focus:border-red-500 focus:ring-2 focus:ring-red-100' 
            : 'border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100'"
        />
      </div>
      <p *ngIf="isFieldInvalid('password')" class="mt-1.5 text-xs font-medium text-red-500 flex items-center gap-1">
        Password must be at least 6 characters long.
      </p>
    </div>
  
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Confirm Password</label>
      <div class="relative">
        <input 
          type="password" 
          formControlName="confirmPassword" 
          placeholder="••••••••"
          class="w-full rounded-xl border px-4 py-2.5 text-slate-900 shadow-sm outline-none transition-all duration-200"
          [ngClass]="isFieldInvalid('confirmPassword') 
            ? 'border-red-300 bg-red-50/30 focus:border-red-500 focus:ring-2 focus:ring-red-100' 
            : 'border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100'"
        />
      </div>
      <p *ngIf="isFieldInvalid('confirmPassword') && registerForm.get('confirmPassword')?.hasError('required')" 
         class="mt-1.5 text-xs font-medium text-red-500 flex items-center gap-1">
        Please confirm your password.
      </p>
      <p *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch') && !registerForm.get('confirmPassword')?.hasError('required') && registerForm.get('confirmPassword')?.touched" 
         class="mt-1.5 text-xs font-medium text-red-500 flex items-center gap-1">
        Passwords do not match.
      </p>
    </div>
  
    <button 
      type="submit" 
      [disabled]="isLoading || registerForm.invalid"
      class="w-full relative bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 disabled:shadow-none text-white font-medium py-3 px-4 rounded-xl shadow-md shadow-indigo-100 active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2 overflow-hidden"
    >
      <span *ngIf="isLoading" class="flex items-center gap-2">
        <svg class="animate-spin h-5 w-5 text-current" xmlns="http://www.w3.org/2000/xl" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Creating account...</span>
      </span>
  
      <span *ngIf="!isLoading">Sign Up</span>
    </button>
  
    <div class="text-center mt-4">
      <p class="text-sm text-slate-500">
        Already have an account? 
        <a 
          routerLink="/login" 
          class="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors duration-200 underline underline-offset-4 cursor-pointer"
        >
          Sign in here
        </a>
      </p>
    </div>
  </form>
