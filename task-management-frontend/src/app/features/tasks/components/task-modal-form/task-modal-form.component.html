<div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
  <h2 class="text-xl font-bold text-slate-900">
    {{ isEditMode ? 'Edit Task' : 'Create New Task' }}
  </h2>
  <button type="button" (click)="close.emit()" class="text-slate-400 hover:text-slate-600 cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
    </svg>
  </button>
</div>

<form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="p-6 flex flex-col gap-4">

  <app-alert-message 
    [type]="'error'" 
    [message]="errorMessage"
    (close)="onDismissError()">
  </app-alert-message>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
    <input type="text" formControlName="title" 
           class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
           [ngClass]="{'border-red-300 focus:ring-red-500': isFieldInvalid('title'), 'border-slate-200': !isFieldInvalid('title')}">
    <span *ngIf="isFieldInvalid('title')" class="text-xs text-red-500 mt-1 block">Title is required (max 100 characters).</span>
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
    <textarea formControlName="description" rows="3"
              class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
              [ngClass]="{'border-red-300 focus:ring-red-500': isFieldInvalid('description'), 'border-slate-200': !isFieldInvalid('description')}"></textarea>
    <span *ngIf="isFieldInvalid('description')" class="text-xs text-red-500 mt-1 block">Description cannot exceed 500 characters.</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div *ngIf="isEditMode">
      <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
      <select formControlName="status" class="w-full px-3 py-2 border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option *ngFor="let option of statusOptions" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Due Date</label>
      <input type="date" formControlName="dueDate" 
             class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
             [ngClass]="{'border-red-300 focus:ring-red-500': isFieldInvalid('dueDate'), 'border-slate-200': !isFieldInvalid('dueDate')}">
      <span *ngIf="isFieldInvalid('dueDate')" class="text-xs text-red-500 mt-1 block">Due date is required.</span>
    </div>
  </div>

  <div class="mt-4 pt-4 border-t border-slate-100 flex items-center justify-end gap-3">
    <button type="button" (click)="close.emit()" 
            class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-xl transition-colors cursor-pointer">
      Cancel
    </button>
    <button type="submit" 
            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md shadow-indigo-100 transition-colors cursor-pointer">
      {{ isEditMode ? 'Save Changes' : 'Create Task' }}
    </button>
  </div>
</form>
